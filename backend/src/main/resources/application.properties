spring.application.name=backend
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://ep-flat-butterfly-amt3d.us-east-2.aws.neon.tech/manam?sslmode=require}
spring.datasource.username=${DB_USER:user}
spring.datasource.password=${DB_PASSWORD:password}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Security
jwt.secret=${JWT_SECRET:your_premium_java_secret_key_that_is_at_least_256_bits_long}
jwt.expiration=604800000
